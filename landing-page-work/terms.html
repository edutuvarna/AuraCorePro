      <p>Özellik mevcudiyeti ve fiyatlandırma değişebilir. Güncel fiyatlar her zaman <a href="https://auracore.pro#pricing">fiyatlandırma sayfamızda</a> görüntülenir.</p>`},
    {id:'accounts',title:'Hesap Kaydı',html:`<p>Belirli özellikleri kullanmak için geçerli bir e-posta adresi ve en az 8 karakterlik bir şifre ile hesap oluşturmanız gerekir. Sorumlu olduğunuz konular:</p>
      <ul><li>Kimlik bilgilerinizin gizliliğini korumak</li><li>Hesabınız altında gerçekleşen tüm aktiviteler</li><li>Doğru ve güncel bilgi sağlamak</li><li>Yetkisiz kullanım şüphesi durumunda derhal <a href="mailto:support@auracore.pro">support@auracore.pro</a> adresine bildirmek</li></ul>
      <p>Güvenliği ihlal edildiğini veya bu Koşulları ihlal ettiğini makul şekilde inandığımız hesapları askıya alma hakkımızı saklı tutarız.</p>`},
    {id:'payments',title:'Abonelikler ve Ödemeler',html:`
      <p><strong>Faturalandırma:</strong> Pro ve Enterprise abonelikleri, <a href="https://stripe.com" target="_blank">Stripe</a> aracılığıyla yinelenen bazda (aylık veya yıllık) faturalandırılır. Abone olarak, her fatura döneminin başında ödeme yönteminizden çekim yapmamıza yetki verirsiniz.</p>
      <p><strong>Fiyatlandırma:</strong> Güncel fiyatlar <a href="https://auracore.pro#pricing">fiyatlandırma sayfamızda</a> görüntülenir. Mevcut abonelere <strong>30 gün önceden yazılı bildirim</strong> ile fiyatları değiştirme hakkımızı saklı tutarız.</p>
      <p><strong>Otomatik Yenileme:</strong> Abonelikler her fatura döneminin sonunda otomatik olarak yenilenir. Yenileme tarihinden önce iptal etmediğiniz sürece o anki geçerli tarifeden ücretlendirilirsiniz.</p>
      <p><strong>Kripto Para:</strong> Bitcoin (BTC) ve USDT (ERC-20) ödemelerini de kabul ediyoruz. Bunlar manuel olarak işlenir ve 24 saat içinde yönetici doğrulamasına tabidir.</p>
      <div class="callout callout-red"><span class="callout-icon">&#9888;</span><div class="callout-text"><strong>Kritik:</strong> Kripto para ile ödeme yaparken, fonları doğru ağdan gönderdiğinizden emin olun — BTC için <strong>Bitcoin ağı</strong>, USDT için <strong>Ethereum (ERC-20)</strong>. Yanlış ağlardan (BEP20, TRC-20 vb.) gönderilen fonlar <strong>kurtarılamaz</strong> ve kalıcı kayba neden olur.</div></div>`},
    {id:'cancellation',title:'İptal ve Otomatik Yenileme',html:`
      <p>Aboneliğinizi istediğiniz zaman aşağıdaki yöntemlerden biriyle iptal edebilirsiniz:</p>
      <ul><li><strong>Stripe Müşteri Portalı</strong> — hesap ayarlarınız üzerinden</li><li><strong>E-posta</strong> — <a href="mailto:support@auracore.pro">support@auracore.pro</a> adresine iptal talebi gönderin</li></ul>
      <p>İptal üzerine:</p>
      <ul><li>Mevcut fatura döneminizin sonuna kadar ücretli özelliklere erişiminiz devam eder</li><li>Fatura dönemi sona erdikten sonra hesabınız Ücretsiz katmana döner</li><li>Verileriniz ve hesabınız bozulmadan kalır — istediğiniz zaman tekrar abone olabilirsiniz</li><li>Fatura dönemi içinde kullanılmayan süre için kısmi iade yapılmaz</li></ul>`},
    {id:'refunds',title:'İade Politikası',html:`
      <div class="callout callout-green"><span class="callout-icon">&#10003;</span><div class="callout-text">AuraCore Pro'dan memnun kalmanızı istiyoruz. Sizin için çalışmıyorsa, düzelteceğiz.</div></div>
      <table class="data-table"><tr><th>Koşul</th><th>İade</th><th>Süreç</th></tr>
      <tr><td>İlk satın almadan itibaren 14 gün içinde</td><td>Tam iade, soru sorulmaz</td><td>E-posta desteği</td></tr>
      <tr><td>Çözemediğimiz teknik sorunlar</td><td>Tam iade</td><td>Destek incelemesinden sonra</td></tr>
      <tr><td>14 günden sonra</td><td>Duruma göre değerlendirme</td><td>Sebep belirterek e-posta desteği</td></tr>
      <tr><td>Kripto para ödemeleri</td><td>Orijinal kripto para birimi ile iade</td><td>TX ID ile e-posta desteği</td></tr></table>
      <p>İade talep etmek için hesap e-postanız ve sebebinizle <a href="mailto:support@auracore.pro">support@auracore.pro</a> adresine ulaşın. İadeler 5-10 iş günü içinde işlenir.</p>`},
    {id:'license',title:'Lisans ve Kullanım Hakları',html:`
      <p>Ödeme üzerine, abonelik katmanınızda belirtilen sayıda cihazda AuraCore Pro'yu kullanmanız için <strong>münhasır olmayan, devredilemez, iptal edilebilir</strong> bir lisans veririz.</p>
      <p><strong>Yapabilecekleriniz:</strong></p>
      <ul><li>Yetkili cihazlarınıza uygulamayı yükleyip kullanmak</li><li>Kişi başına bir hesap oluşturmak</li><li>Katmanınızdaki tüm özellikleri kullanmak</li></ul>
      <p><strong>Yapamayacaklarınız:</strong></p>
      <ul><li>Yazılımı yeniden dağıtmak, satmak, alt lisans vermek veya kiralamak</li><li>Yazılımı tersine mühendislik yapmak, decompile etmek veya disassemble etmek</li><li>Yazılımı yasadışı amaçlarla veya başkalarına zarar vermek için kullanmak</li><li>Hesap kimlik bilgilerinizi başkalarıyla paylaşmak</li><li>Lisans kısıtlamalarını, cihaz limitlerini veya ödeme sistemlerini atlatmaya çalışmak</li><li>Ücretsiz katman sınırlamalarını aşmak için birden fazla hesap oluşturmak</li></ul>`},
    {id:'aup',title:'Kabul Edilebilir Kullanım Politikası',html:`
      <p>AuraCore Pro'yu aşağıdaki amaçlarla kullanmamayı kabul edersiniz:</p>
      <ul><li>Geçerli yasa ve düzenlemeleri ihlal etmek</li><li>Chargeback dolandırıcılığı dahil dolandırıcılık faaliyetlerinde bulunmak</li><li>Diğer kullanıcıların hesaplarına yetkisiz erişim sağlamaya çalışmak</li><li>Sunucularımızı, API'lerimizi veya altyapımızı bozmak veya müdahale etmek</li><li>Hataları veya güvenlik açıklarını bildirmek yerine istismar etmek</li><li>Uygulamayı sisteminize veya başkalarının sistemlerine zarar verebilecek şekillerde kullanmak</li></ul>
      <p>Bu politikanın ihlali, iade yapılmadan anında hesap askıya alma veya sonlandırma ile sonuçlanabilir.</p>`},
    {id:'system-mods',title:'Sistem Değişiklikleri',html:`
      <p>AuraCore Pro, Windows ayarlarını, kayıt defteri girdilerini, zamanlanmış görevleri, başlangıç programlarını ve sistem dosyalarını değiştirebilen sistem optimizasyonları gerçekleştirir.</p>
      <div class="callout callout-amber"><span class="callout-icon">&#9888;</span><div class="callout-text"><strong>Önemli:</strong> Tüm optimizasyonları güvenli ve geri alınabilir olarak tasarlanmış olsa da, sistem değişiklikleri doğal risk taşır. Optimizasyonları uygulamadan önce bir sistem geri yükleme noktası oluşturmanızı şiddetle tavsiye ederiz. AuraCore Pro, üçüncü taraf yazılım çakışmalarından, kötü amaçlı yazılımlardan veya önceden var olan sistem sorunlarından kaynaklanan sistem kararsızlığından sorumlu değildir.</div></div>
      <ul><li>Çöp Temizleyici taramaları zarar vermez — silmeden önce inceleyip onaylarsınız</li><li>Kayıt defteri değişiklikleri kaydedilir ve geri alınabilir</li><li>Oyun Modu değişiklikleri geçicidir ve otomatik olarak geri yüklenir</li><li>Bloatware kaldırma, topluluk güvenlik puanlarını takip eder</li></ul>`},
    {id:'updates',title:'Güncellemeler ve Erişilebilirlik',html:`
      <p><strong>Güncellemeler:</strong> Hata düzeltmeleri, güvenlik yamaları, yeni özellikler veya köklü değişiklikler içeren güncellemeler yayınlayabiliriz. Bazı güncellemeler <strong>zorunlu</strong> olabilir.</p>
      <p><strong>Erişilebilirlik:</strong> API ve kimlik doğrulama hizmetlerimiz için yüksek çalışma süresi hedefliyoruz. Ancak kesintisiz hizmet <strong>garanti etmiyoruz</strong>.</p>
      <p><strong>Hizmet sonlandırma:</strong> Hizmeti sonlandırmaya karar verirsek, mevcut abonelere en az <strong>90 gün önceden bildirim</strong> sağlayacak ve kalan abonelik süreleri için orantılı iade sunacağız.</p>`},
    {id:'ip',title:'Fikri Mülkiyet',html:`
      <p>AuraCore Pro, kaynak kodu, tasarımı, logoları (Orbital Core işareti dahil), belgeleri ve tüm ilgili materyaller AuraCore Pro'nun fikri mülkiyetidir ve telif hakkı ile korunmaktadır.</p>
      <p><strong>Kullanıcı Geri Bildirimi:</strong> Geri bildirim, öneri veya özellik talebi gönderirseniz, bu geri bildirimi ürünlerimize dahil etmek için münhasır olmayan, telifsiz, süresiz bir lisans verirsiniz.</p>
      <p><strong>İçeriğiniz:</strong> Sisteminizdeki dosyalar, veriler veya içerikler üzerinde mülkiyet iddiasında bulunmuyoruz.</p>`},
    {id:'termination',title:'Fesih',html:`
      <p><strong>Sizin tarafınızdan:</strong> Destek ile iletişime geçerek hesabınızı istediğiniz zaman kapatabilirsiniz.</p>
      <p><strong>Bizim tarafımızdan:</strong> Aşağıdaki durumlarda hesabınızı askıya alabilir veya sonlandırabiliriz:</p>
      <ul><li>Bu Koşulları veya Kabul Edilebilir Kullanım Politikasını ihlal etmeniz</li><li>Dolandırıcılık faaliyetlerinde bulunmanız</li><li>Haksız chargeback başlatmanız</li><li>Hizmeti kötüye kullanmak için birden fazla hesap oluşturmanız</li></ul>
      <p>Haklı nedenle fesih durumunda iade yapılmaz.</p>`},
    {id:'liability',title:'Sorumluluk Sınırlaması',html:`
      <p>Geçerli yasaların izin verdiği azami ölçüde:</p>
      <ul><li>AuraCore Pro herhangi bir garanti olmaksızın <strong>"olduğu gibi"</strong> ve <strong>"mevcut olduğu şekliyle"</strong> sağlanır</li><li>Dolaylı, arızi, özel, sonuçsal veya cezai zararlardan sorumlu olmayacağız</li><li>Toplam sorumluluğumuz, talepten önceki <strong>12 ay</strong> içinde bize ödediğiniz tutarı geçmeyecektir</li></ul>`},
    {id:'force-majeure',title:'Mücbir Sebep',html:`<p>Doğal afetler, savaşlar, hükümet eylemleri, elektrik kesintileri, internet kesintileri, pandemiler veya üçüncü taraf hizmet sağlayıcı arızaları dahil ancak bunlarla sınırlı olmamak üzere, makul kontrolümüz dışındaki koşullardan kaynaklanan yükümlülüklerimizi yerine getirmedeki herhangi bir başarısızlık veya gecikmeden sorumlu olmayacağız.</p>`},
    {id:'disputes',title:'Uyuşmazlık Çözümü',html:`
      <p><strong>Gayri resmi çözüm:</strong> Resmi bir uyuşmazlık başlatmadan önce, <a href="mailto:support@auracore.pro">support@auracore.pro</a> adresinden bize ulaşmayı ve sorunu en az 30 gün gayri resmi olarak çözmeye çalışmayı kabul edersiniz.</p>
      <p><strong>Uygulanacak hukuk:</strong> Bu Koşullar, <strong>Bulgaristan</strong> ve <strong>Avrupa Birliği</strong> hukukuna tabidir.</p>
      <p><strong>Yetki alanı:</strong> Gayri resmi olarak çözülemeyen uyuşmazlıklar Bulgaristan mahkemelerine sunulacaktır.</p>
      <p><strong>AB tüketicileri:</strong> AB tüketicisiyseniz, <a href="https://ec.europa.eu/consumers/odr" target="_blank">AB Çevrimiçi Uyuşmazlık Çözümü platformunu</a> da kullanabilirsiniz.</p>`},
    {id:'severability',title:'Bölünebilirlik',html:`<p>Bu Koşulların herhangi bir hükmünün yetkili bir mahkeme tarafından uygulanamaz veya geçersiz bulunması halinde, söz konusu hüküm gerekli minimum ölçüde sınırlandırılacak veya kaldırılacak ve kalan hükümler tam olarak yürürlükte kalmaya devam edecektir.</p>`},
    {id:'entire',title:'Bütün Anlaşma',html:`<p>Bu Koşullar, <a href="/privacy">Gizlilik Politikamız</a> ile birlikte, Hizmetin kullanımına ilişkin sizinle AuraCore Pro arasındaki tüm anlaşmayı oluşturur ve önceki tüm anlaşma ve mutabakatların yerine geçer.</p>`},
    {id:'changes',title:'Koşullardaki Değişiklikler',html:`<p>Bu Koşulları zaman zaman güncelleyebiliriz. Önemli değişiklikler, yürürlüğe girmeden en az <strong>14 gün</strong> önce kayıtlı kullanıcılara e-posta ile bildirilecektir. Değişiklikler yürürlüğe girdikten sonra Hizmeti kullanmaya devam etmeniz, revize edilmiş Koşulları kabul etmeniz anlamına gelir.</p>`},
    {id:'contact',title:'İletişim',html:`
      <p>Bu Kullanım Koşulları hakkında sorularınız için:</p>
      <p><strong>E-posta:</strong> <a href="mailto:support@auracore.pro">support@auracore.pro</a><br>
      <strong>Web sitesi:</strong> <a href="https://auracore.pro">auracore.pro</a></p>`}
  ]
}
};

let lang = localStorage.getItem('aura_lang') || 'en';

function setLang(l) {
  lang = l;
  localStorage.setItem('aura_lang', l);
  render();
}

function render() {
  const d = TOS[lang];
  document.getElementById('navBack').textContent = d.navBack;
  document.getElementById('heroBadge').innerHTML = d.heroBadge;
  document.getElementById('title').textContent = d.title;
  document.getElementById('subtitle').textContent = d.subtitle;
  document.getElementById('updatedText').textContent = d.updated;
  document.getElementById('tocTitle').textContent = d.tocTitle;
  document.getElementById('footPrivacy').textContent = d.footPrivacy;
  document.documentElement.lang = lang === 'tr' ? 'tr' : 'en';
  document.title = d.title + ' — AuraCore Pro';

  document.getElementById('langEN').className = 'lang-btn' + (lang==='en' ? ' active' : '');
  document.getElementById('langTR').className = 'lang-btn' + (lang==='tr' ? ' active' : '');

  let toc = '';
  let content = '';
  d.sections.forEach((s, i) => {
    const num = i + 1;
    toc += `<li><a href="#${s.id}"><span class="num">${num}.</span>${s.title}</a></li>`;
    content += `<h2 id="${s.id}"><span class="sec-num">${num}</span>${s.title}</h2>${s.html}`;
  });
  document.getElementById('tocList').innerHTML = toc;
  document.getElementById('mainContent').innerHTML = content;
}

render();
</script>
</body>
</html>
