<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — AuraCore Pro</title>
<meta name="description" content="Reset your AuraCore Pro account password.">
<meta name="theme-color" content="#06d6a0">
<link rel="canonical" href="https://auracore.pro/forgot-password">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050811;--bg2:#0a0f1e;--surface:#0f1629;--surface2:#141b33;--cyan:#06d6a0;--blue:#3b82f6;--purple:#8b5cf6;--red:#ef4444;--text:#e8eaf6;--text2:#94a3b8;--text3:#475569}
html{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100%;display:flex;align-items:center;justify-content:center;line-height:1.6;padding:1rem;position:relative;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Outfit',sans-serif;line-height:1.15}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--cyan);border-radius:5px}

/* Background effects */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(6,214,160,0.06),transparent),radial-gradient(ellipse 60% 50% at 80% 50%,rgba(59,130,246,0.04),transparent);pointer-events:none;z-index:0}

/* Lang toggle */
.lang-toggle{position:fixed;top:1.2rem;right:1.5rem;z-index:10}
.lang-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text2);padding:6px 14px;border-radius:6px;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'DM Sans'}
.lang-btn:hover{background:rgba(6,214,160,0.1);color:var(--cyan);border-color:rgba(6,214,160,0.3)}

/* Card */
.fp-card{background:var(--surface);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:2.5rem;max-width:420px;width:100%;position:relative;z-index:1;animation:fadeUp 0.5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Logo */
.fp-logo{display:block;width:48px;height:48px;margin:0 auto 0.6rem}
.fp-brand{text-align:center;font-family:'Outfit';font-weight:700;font-size:0.95rem;color:var(--text2);margin-bottom:1.6rem}

/* Typography */
.fp-title{font-family:'Outfit';font-size:1.4rem;font-weight:700;text-align:center;margin-bottom:0.4rem}
.fp-subtitle{color:var(--text2);font-size:0.85rem;text-align:center;margin-bottom:1.8rem}

/* Inputs */
.fp-input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:var(--text);font-family:'DM Sans';font-size:0.9rem;transition:border-color 0.2s;outline:none;margin-bottom:12px}
.fp-input:focus{border-color:rgba(6,214,160,0.4)}
.fp-input::placeholder{color:var(--text3)}
.fp-input[readonly]{opacity:0.6;cursor:default}
.fp-input.code{text-align:center;font-family:'DM Sans',monospace;font-size:1.4rem;letter-spacing:0.5em;padding:14px 16px}

/* Button */
.fp-btn{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--cyan),#0891b2);color:var(--bg);font-weight:700;font-size:0.95rem;cursor:pointer;font-family:'DM Sans';transition:all 0.2s;margin-top:4px}
.fp-btn:hover{box-shadow:0 4px 20px rgba(6,214,160,0.3);transform:translateY(-1px)}
.fp-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;box-shadow:none}

/* Links */
.fp-link{text-align:center;margin-top:1.2rem;font-size:0.82rem;color:var(--text3)}
.fp-link a{color:var(--cyan);cursor:pointer;text-decoration:none;font-weight:600}
.fp-link a:hover{text-decoration:underline}

/* Messages */
.fp-msg{text-align:center;font-size:0.8rem;margin-top:10px;padding:8px 12px;border-radius:8px;display:none}
.fp-msg.err{display:block;color:var(--red);background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15)}
.fp-msg.ok{display:block;color:var(--cyan);background:rgba(6,214,160,0.08);border:1px solid rgba(6,214,160,0.15)}

/* Password hint */
.fp-hint{font-size:0.75rem;color:var(--text3);margin:-6px 0 12px 4px}

/* Step visibility */
.fp-step{display:none}
.fp-step.active{display:block}

/* Success screen */
.fp-success{text-align:center;padding:1rem 0}
.fp-success-icon{width:64px;height:64px;border-radius:50%;background:rgba(6,214,160,0.1);border:2px solid rgba(6,214,160,0.3);display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem}
.fp-success-icon svg{width:32px;height:32px;color:var(--cyan)}
.fp-success h2{font-family:'Outfit';font-size:1.3rem;font-weight:700;margin-bottom:0.5rem}
.fp-success p{color:var(--text2);font-size:0.85rem;margin-bottom:0.3rem}
.fp-success .fp-countdown{color:var(--text3);font-size:0.8rem}

/* Responsive */
@media(max-width:480px){
  .fp-card{padding:2rem 1.5rem;margin:0 0.5rem}
  .fp-input.code{font-size:1.2rem;letter-spacing:0.35em}
}
</style>
</head>
<body>

<div class="lang-toggle">
  <button class="lang-btn" onclick="toggleLang()" id="langBtn">TR</button>
</div>

<div class="fp-card">
  <!-- Logo -->
  <a href="https://auracore.pro" style="text-decoration:none">
    <svg class="fp-logo" viewBox="0 0 36 36" fill="none">
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="36" y2="36"><stop stop-color="#06d6a0"/><stop offset="1" stop-color="#0891b2"/></linearGradient>
        <linearGradient id="g2" x1="36" y1="0" x2="0" y2="36"><stop stop-color="#3b82f6"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <circle cx="18" cy="18" r="16" stroke="url(#g1)" stroke-width="1.5" opacity=".3"/>
      <ellipse cx="18" cy="18" rx="16" ry="7" stroke="url(#g1)" stroke-width="1.2" opacity=".5"><animateTransform attributeName="transform" type="rotate" from="0 18 18" to="360 18 18" dur="12s" repeatCount="indefinite"/></ellipse>
      <ellipse cx="18" cy="18" rx="16" ry="7" stroke="url(#g2)" stroke-width="1.2" opacity=".5"><animateTransform attributeName="transform" type="rotate" from="120 18 18" to="480 18 18" dur="16s" repeatCount="indefinite"/></ellipse>
      <ellipse cx="18" cy="18" rx="16" ry="7" stroke="url(#g1)" stroke-width="1" opacity=".3"><animateTransform attributeName="transform" type="rotate" from="240 18 18" to="600 18 18" dur="20s" repeatCount="indefinite"/></ellipse>
      <circle cx="18" cy="18" r="5" fill="url(#g1)" filter="url(#glow)"><animate attributeName="r" values="3.5;6;3.5" dur="2.5s" repeatCount="indefinite"/><animate attributeName="opacity" values=".7;1;.7" dur="2.5s" repeatCount="indefinite"/></circle>
      <circle cx="18" cy="18" r="2" fill="#050811" opacity=".4"/>
    </svg>
    <div class="fp-brand">AuraCore Pro</div>
  </a>

  <!-- STEP 1: Enter Email -->
  <div class="fp-step active" id="step1">
    <h1 class="fp-title" data-i18n="title1">Reset Password</h1>
    <p class="fp-subtitle" data-i18n="sub1">Enter your email and we'll send you a reset code</p>
    <form onsubmit="sendCode(event)">
      <input class="fp-input" type="email" id="emailInput" placeholder="Email" data-i18n-ph="email" required autocomplete="email" autofocus>
      <button class="fp-btn" type="submit" id="sendBtn" data-i18n="btn1">Send Reset Code</button>
    </form>
    <div class="fp-msg" id="msg1"></div>
    <div class="fp-link"><a href="https://auracore.pro" data-i18n="back">&larr; Back to Sign In</a></div>
  </div>

  <!-- STEP 2: Enter Code + New Password -->
  <div class="fp-step" id="step2">
    <h1 class="fp-title" data-i18n="title2">Enter Reset Code</h1>
    <p class="fp-subtitle" data-i18n="sub2">Check your email for the 6-digit code</p>
    <form onsubmit="resetPassword(event)">
      <input class="fp-input" type="email" id="emailReadonly" readonly>
      <input class="fp-input code" type="text" id="codeInput" placeholder="000000" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" required autocomplete="one-time-code">
      <input class="fp-input" type="password" id="newPassword" placeholder="New password" data-i18n-ph="newpw" minlength="10" required autocomplete="new-password">
      <div class="fp-hint" data-i18n="hint">Minimum 10 characters</div>
      <input class="fp-input" type="password" id="confirmPassword" placeholder="Confirm password" data-i18n-ph="confirmpw" minlength="10" required autocomplete="new-password">
      <button class="fp-btn" type="submit" id="resetBtn" data-i18n="btn2">Reset Password</button>
    </form>
    <div class="fp-msg" id="msg2"></div>
    <div class="fp-link"><a href="#" onclick="requestNewCode();return false" data-i18n="newcode">&larr; Request new code</a></div>
  </div>

  <!-- STEP 3: Success -->
  <div class="fp-step" id="step3">
    <div class="fp-success">
      <div class="fp-success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 data-i18n="success_title">Password Reset!</h2>
      <p data-i18n="success_msg">Your password has been successfully changed.</p>
      <p class="fp-countdown" data-i18n="redirect">Redirecting to sign in in <span id="countdown">3</span>s...</p>
    </div>
  </div>
</div>

<script>
// --- i18n ---
let lang = 'en';
const i18n = {
  en: {
    title1: 'Reset Password',
    sub1: "Enter your email and we'll send you a reset code",
    btn1: 'Send Reset Code',
    back: '\u2190 Back to Sign In',
    title2: 'Enter Reset Code',
    sub2: 'Check your email for the 6-digit code',
    btn2: 'Reset Password',
    newcode: '\u2190 Request new code',
    hint: 'Minimum 10 characters',
    success_title: 'Password Reset!',
    success_msg: 'Your password has been successfully changed.',
    redirect: 'Redirecting to sign in in {n}s...',
    err_email: 'Please enter a valid email address.',
    err_match: 'Passwords do not match.',
    err_min: 'Password must be at least 10 characters.',
    err_code: 'Please enter a 6-digit code.',
    err_generic: 'Something went wrong. Please try again.',
    sending: 'Sending...',
    resetting: 'Resetting...',
    email: 'Email',
    newpw: 'New password',
    confirmpw: 'Confirm password',
    page_title: 'Reset Password \u2014 AuraCore Pro'
  },
  tr: {
    title1: '\u015Eifre S\u0131f\u0131rla',
    sub1: 'E-postan\u0131z\u0131 girin, size bir s\u0131f\u0131rlama kodu g\u00f6nderece\u011fiz',
    btn1: 'S\u0131f\u0131rlama Kodu G\u00f6nder',
    back: '\u2190 Giri\u015f\u2019e D\u00f6n',
    title2: 'S\u0131f\u0131rlama Kodunu Girin',
    sub2: 'E-postan\u0131zda 6 haneli kodu kontrol edin',
    btn2: '\u015Eifreyi S\u0131f\u0131rla',
    newcode: '\u2190 Yeni kod iste',
    hint: 'En az 10 karakter',
    success_title: '\u015Eifre S\u0131f\u0131rland\u0131!',
    success_msg: '\u015Eifreniz ba\u015far\u0131yla de\u011fi\u015ftirildi.',
    redirect: '{n} saniye i\u00e7inde giri\u015f sayfas\u0131na y\u00f6nlendiriliyorsunuz...',
    err_email: 'L\u00fctfen ge\u00e7erli bir e-posta adresi girin.',
    err_match: '\u015Eifreler e\u015fle\u015fmiyor.',
    err_min: '\u015Eifre en az 10 karakter olmal\u0131d\u0131r.',
    err_code: 'L\u00fctfen 6 haneli bir kod girin.',
    err_generic: 'Bir \u015feyler ters gitti. L\u00fctfen tekrar deneyin.',
    sending: 'G\u00f6nderiliyor...',
    resetting: 'S\u0131f\u0131rlan\u0131yor...',
    email: 'E-posta',
    newpw: 'Yeni \u015fifre',
    confirmpw: '\u015Eifreyi onayla',
    page_title: '\u015Eifre S\u0131f\u0131rla \u2014 AuraCore Pro'
  }
};

function t(key) { return i18n[lang][key] || key; }

function applyLang() {
  document.documentElement.lang = lang;
  document.title = t('page_title');
  document.getElementById('langBtn').textContent = lang === 'en' ? 'TR' : 'EN';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (key === 'redirect') {
      el.innerHTML = t('redirect').replace('{n}', '<span id="countdown">' + (el.querySelector('#countdown')?.textContent || '3') + '</span>');
    } else {
      el.textContent = t(key);
    }
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    el.placeholder = t(el.getAttribute('data-i18n-ph'));
  });
}

function toggleLang() {
  lang = lang === 'en' ? 'tr' : 'en';
  applyLang();
}

// --- Steps ---
function showStep(n) {
  document.querySelectorAll('.fp-step').forEach(s => s.classList.remove('active'));
  document.getElementById('step' + n).classList.add('active');
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'fp-msg ' + type;
}
function clearMsg(id) {
  const el = document.getElementById(id);
  el.textContent = '';
  el.className = 'fp-msg';
}

// --- Step 1: Send code ---
async function sendCode(e) {
  e.preventDefault();
  clearMsg('msg1');
  const email = document.getElementById('emailInput').value.trim();
  if (!email) { showMsg('msg1', t('err_email'), 'err'); return; }

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = t('sending');

  try {
    const res = await fetch('https://api.auracore.pro/api/auth/password/forgot', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json().catch(() => ({}));

    if (res.ok) {
      document.getElementById('emailReadonly').value = email;
      showStep(2);
      document.getElementById('codeInput').focus();
    } else {
      showMsg('msg1', data.message || data.error || t('err_generic'), 'err');
    }
  } catch (err) {
    showMsg('msg1', t('err_generic'), 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = t('btn1');
  }
}

// --- Step 2: Reset password ---
async function resetPassword(e) {
  e.preventDefault();
  clearMsg('msg2');

  const email = document.getElementById('emailReadonly').value;
  const code = document.getElementById('codeInput').value.trim();
  const newPw = document.getElementById('newPassword').value;
  const confirmPw = document.getElementById('confirmPassword').value;

  if (!/^\d{6}$/.test(code)) { showMsg('msg2', t('err_code'), 'err'); return; }
  if (newPw.length < 10) { showMsg('msg2', t('err_min'), 'err'); return; }
  if (newPw !== confirmPw) { showMsg('msg2', t('err_match'), 'err'); return; }

  const btn = document.getElementById('resetBtn');
  btn.disabled = true;
  btn.textContent = t('resetting');

  try {
    const res = await fetch('https://api.auracore.pro/api/auth/password/reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, code, newPassword: newPw })
    });
    const data = await res.json().catch(() => ({}));

    if (res.ok) {
      showStep(3);
      startRedirectCountdown();
    } else {
      showMsg('msg2', data.message || data.error || t('err_generic'), 'err');
    }
  } catch (err) {
    showMsg('msg2', t('err_generic'), 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = t('btn2');
  }
}

// --- Redirect countdown ---
function startRedirectCountdown() {
  let sec = 3;
  const timer = setInterval(() => {
    sec--;
    const span = document.getElementById('countdown');
    if (span) span.textContent = sec;
    if (sec <= 0) {
      clearInterval(timer);
      window.location.href = 'https://auracore.pro';
    }
  }, 1000);
}

// --- Request new code (go back to step 1) ---
function requestNewCode() {
  clearMsg('msg2');
  document.getElementById('codeInput').value = '';
  document.getElementById('newPassword').value = '';
  document.getElementById('confirmPassword').value = '';
  showStep(1);
  document.getElementById('emailInput').focus();
}

// --- Code input: digits only ---
document.getElementById('codeInput').addEventListener('input', function() {
  this.value = this.value.replace(/\D/g, '').slice(0, 6);
});

// Init
applyLang();
</script>
</body>
</html>
