<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer aura glow -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#06d6a0" stroke-width="0.8" opacity="0.1"/>
  
  <!-- Two orbital arcs -->
  <path d="M18 50 A86 50 -30 0 1 182 78" fill="none" stroke="#06d6a0" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M182 122 A86 50 -30 0 1 18 150" fill="none" stroke="#0891b2" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Orbital module dots -->
  <circle cx="46" cy="54" r="5" fill="#06d6a0"/>
  <circle cx="154" cy="60" r="3.5" fill="#06d6a0" opacity="0.7"/>
  <circle cx="154" cy="140" r="5" fill="#0891b2"/>
  <circle cx="46" cy="146" r="3.5" fill="#0891b2" opacity="0.7"/>
  
  <!-- Vertical convergence lines -->
  <line x1="100" y1="12" x2="100" y2="78" stroke="#06d6a0" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="100" y1="122" x2="100" y2="188" stroke="#06d6a0" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <circle cx="100" cy="12" r="2.5" fill="#06d6a0" opacity="0.5"/>
  <circle cx="100" cy="188" r="2.5" fill="#06d6a0" opacity="0.5"/>
  
  <!-- Core: layered circles -->
  <circle cx="100" cy="100" r="32" fill="#06d6a0" opacity="0.06" stroke="#06d6a0" stroke-width="1"/>
  <circle cx="100" cy="100" r="20" fill="#06d6a0" opacity="0.1" stroke="#0891b2" stroke-width="0.8"/>
  <circle cx="100" cy="100" r="10" fill="#06d6a0" opacity="0.25"/>
  <circle cx="100" cy="100" r="6" fill="#06d6a0"/>
  <circle cx="100" cy="100" r="3" fill="#0891b2"/>
</svg>
